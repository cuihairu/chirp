name: chirp_mobile
description: Chirp real-time communication mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # FFI for native SDK integration
  ffi: ^2.1.0

  # State management
  provider: ^6.1.0

  # WebRTC for voice calls
  flutter_webrtc: ^0.9.47+2

  # HTTP requests
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0

  # Push notifications
  firebase_messaging: ^14.7.3
  flutter_local_notifications: ^16.1.0

  # Permissions
  permission_handler: ^11.0.1

  # UI components
  cupertino_icons: ^1.0.2

  # JSON serialization
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

  # WebSocket
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
