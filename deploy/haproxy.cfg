# HAProxy 配置文件
# 用于 Chirp 集群负载均衡

global
    # 最大连接数
    maxconn 100000
    # 运行日志
    log 127.0.0.1 local0 info
    # 守护进程
    daemon

defaults
    # 默认超时设置
    timeout connect 5s
    timeout client  60m    # 长连接，客户端超时设长
    timeout server  60m    # 长连接，服务端超时设长
    # 使用 TCP 模式（适合长连接）
    mode tcp
    # 日志格式
    option tcplog
    # 不记录空连接
    option dontlognull
    # 启用压缩
    # compression algo gzip

# 统计页面（监控）
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats realm HAProxy\ Statistics
    stats auth admin:change_me_please

# ============================================
# Gateway 服务负载均衡
# ============================================

# Gateway TCP (游戏客户端)
listen gateway_tcp
    bind *:5000
    mode tcp
    # 使用最少连接数算法（适合长连接）
    balance leastconn
    option tcplog
    option tcp-check
    # 健康检查：每5秒检查一次
    default-server inter 5s rise 2 fall 3
    # 后端服务器（通过 Docker Compose 自动扩展）
    server gateway-1 gateway-1:5000 check weight 100
    server gateway-2 gateway-2:5000 check weight 100
    server gateway-3 gateway-3:5000 check weight 100
    # 备用服务器（当主服务器都挂了才使用）
    # server gateway-standby gateway-standby:5000 check backup

# Gateway WebSocket (Web 客户端)
listen gateway_ws
    bind *:5001
    mode tcp
    balance leastconn
    option tcplog
    option tcp-check
    default-server inter 5s rise 2 fall 3
    # WebSocket 连接升级检测
    tcp-request inspect-delay 5s
    tcp-request content accept if HTTP
    server gateway-1 gateway-1:5001 check weight 100
    server gateway-2 gateway-2:5001 check weight 100
    server gateway-3 gateway-3:5001 check weight 100

# ============================================
# Auth 服务负载均衡
# ============================================

listen auth_tcp
    bind *:6000
    mode tcp
    balance roundrobin
    option tcplog
    option tcp-check
    default-server inter 3s rise 2 fall 3
    server auth-1 auth-1:6000 check
    server auth-2 auth-2:6000 check
    server auth-3 auth-3:6000 check

# ============================================
# Chat 服务负载均衡
# ============================================

# Chat TCP (直连)
listen chat_tcp
    bind *:7000
    mode tcp
    balance leastconn
    option tcplog
    option tcp-check
    default-server inter 5s rise 2 fall 3
    server chat-1 chat-1:7000 check
    server chat-2 chat-2:7000 check
    server chat-3 chat-3:7000 check

# Chat WebSocket
listen chat_ws
    bind *:7001
    mode tcp
    balance leastconn
    option tcplog
    option tcp-check
    default-server inter 5s rise 2 fall 3
    server chat-1 chat-1:7001 check
    server chat-2 chat-2:7001 check
    server chat-3 chat-3:7001 check

# ============================================
# Social 服务负载均衡
# ============================================

listen social_tcp
    bind *:8000
    mode tcp
    balance leastconn
    option tcplog
    option tcp-check
    default-server inter 5s rise 2 fall 3
    server social-1 social-1:8000 check
    server social-2 social-2:8000 check

listen social_ws
    bind *:8001
    mode tcp
    balance leastconn
    option tcplog
    option tcp-check
    default-server inter 5s rise 2 fall 3
    server social-1 social-1:8001 check
    server social-2 social-2:8001 check

# ============================================
# Voice 服务负载均衡
# ============================================

listen voice_tcp
    bind *:9000
    mode tcp
    balance leastconn
    option tcplog
    option tcp-check
    default-server inter 5s rise 2 fall 3
    server voice-1 voice-1:9000 check
    server voice-2 voice-2:9000 check

listen voice_ws
    bind *:9001
    mode tcp
    balance leastconn
    option tcplog
    option tcp-check
    default-server inter 5s rise 2 fall 3
    server voice-1 voice-1:9001 check
    server voice-2 voice-2:9001 check

