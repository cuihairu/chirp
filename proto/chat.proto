syntax = "proto3";

package chirp.chat;

option go_package = "github.com/cui/chirp/proto/chat";

import "proto/common.proto";

// 聊天消息类型
enum MsgType {
  TEXT = 0;           // 文本消息
  EMOJI = 1;          // 表情
  VOICE = 2;          // 语音片段
  IMAGE = 3;          // 图片
  SYSTEM = 99;        // 系统消息
}

// 聊天频道类型
enum ChannelType {
  PRIVATE = 0;        // 私聊 (1v1)
  TEAM = 1;           // 队伍频道
  GUILD = 2;          // 公会频道
  WORLD = 3;          // 世界频道
}

// 发送消息请求
message SendMessageRequest {
  string sender_id = 1;
  string receiver_id = 2;      // 私聊时的接收者
  ChannelType channel_type = 3;
  string channel_id = 4;       // 频道 ID (队伍 ID、公会 ID 等)
  MsgType msg_type = 5;
  bytes content = 6;           // 消息内容 (根据 MsgType 解析)
  int64 client_timestamp = 7;
}

// 发送消息响应
message SendMessageResponse {
  common.ErrorCode code = 1;
  string message_id = 2;       // 服务器分配的消息 ID
  int64 server_timestamp = 3;
}

// 聊天消息
message ChatMessage {
  string message_id = 1;
  string sender_id = 2;
  string receiver_id = 3;      // 私聊时的接收者
  ChannelType channel_type = 4;
  string channel_id = 5;
  MsgType msg_type = 6;
  bytes content = 7;
  int64 timestamp = 8;
}

// 拉取历史消息请求
message GetHistoryRequest {
  string user_id = 1;
  ChannelType channel_type = 2;
  string channel_id = 3;
  int64 before_timestamp = 4;  // 拉取此时间之前的消息
  int32 limit = 5;             // 最多拉取多少条，默认 50
}

// 拉取历史消息响应
message GetHistoryResponse {
  common.ErrorCode code = 1;
  repeated ChatMessage messages = 2;
  bool has_more = 3;           // 是否还有更多历史消息
}

// ========== Group Chat ==========

// Group member role
enum GroupMemberRole {
  MEMBER = 0;         // Regular member
  MODERATOR = 1;      // Can kick/ban members
  ADMIN = 2;          // Full admin privileges
  OWNER = 3;          // Group owner
}

// Create group request
message CreateGroupRequest {
  string creator_id = 1;
  string group_name = 2;
  string description = 3;
  string avatar_url = 4;
  int32 max_members = 5;       // 0 for unlimited
  repeated string initial_members = 6;
}

message CreateGroupResponse {
  common.ErrorCode code = 1;
  string group_id = 2;
  int64 server_time = 3;
}

// Group information
message GroupInfo {
  string group_id = 1;
  string group_name = 2;
  string description = 3;
  string avatar_url = 4;
  string owner_id = 5;
  int32 member_count = 6;
  int32 max_members = 7;
  int64 created_at = 8;
  map<string, string> metadata = 9;
}

// Group member information
message GroupMember {
  string user_id = 1;
  string username = 2;
  string avatar_url = 3;
  GroupMemberRole role = 4;
  int64 joined_at = 5;
  int64 last_read_at = 6;      // Last read message timestamp
}

// Join group request
message JoinGroupRequest {
  string user_id = 1;
  string group_id = 2;
  string invite_code = 3;      // Optional invite code
}

message JoinGroupResponse {
  common.ErrorCode code = 1;
  GroupInfo group = 2;
  int64 server_time = 3;
}

// Leave group request
message LeaveGroupRequest {
  string user_id = 1;
  string group_id = 2;
}

message LeaveGroupResponse {
  common.ErrorCode code = 1;
  int64 server_time = 2;
}

// Kick member from group
message KickMemberRequest {
  string requester_id = 1;
  string group_id = 2;
  string target_user_id = 3;
}

message KickMemberResponse {
  common.ErrorCode code = 1;
  int64 server_time = 2;
}

// Get group info
message GetGroupInfoRequest {
  string group_id = 1;
}

message GetGroupInfoResponse {
  common.ErrorCode code = 1;
  GroupInfo group = 2;
}

// Get group members
message GetGroupMembersRequest {
  string group_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetGroupMembersResponse {
  common.ErrorCode code = 1;
  repeated GroupMember members = 2;
  int32 total_count = 3;
}

// Get user's groups
message GetUserGroupsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetUserGroupsResponse {
  common.ErrorCode code = 1;
  repeated GroupInfo groups = 2;
  int32 total_count = 3;
}

// Invite user to group
message InviteToGroupRequest {
  string inviter_id = 1;
  string group_id = 2;
  string target_user_id = 3;
}

message InviteToGroupResponse {
  common.ErrorCode code = 1;
  int64 server_time = 2;
}

// Group notification messages
message GroupCreatedNotify {
  GroupInfo group = 1;
  int64 timestamp = 2;
}

message GroupMemberJoinedNotify {
  string group_id = 1;
  GroupMember member = 2;
  int64 timestamp = 3;
}

message GroupMemberLeftNotify {
  string group_id = 1;
  string user_id = 2;
  int64 timestamp = 3;
}

message GroupMemberKickedNotify {
  string group_id = 1;
  string user_id = 2;
  string kicked_by = 3;
  int64 timestamp = 4;
}

message GroupUpdatedNotify {
  GroupInfo group = 1;
  int64 timestamp = 2;
}

// ========== Read Receipts ==========

// Mark message(s) as read
message MarkReadRequest {
  string user_id = 1;
  string channel_id = 2;
  ChannelType channel_type = 3;
  string message_id = 4;       // Read up to this message
  int64 read_timestamp = 5;    // When user read the message
}

message MarkReadResponse {
  common.ErrorCode code = 1;
  int64 server_time = 2;
}

// Read receipt information
message ReadReceipt {
  string user_id = 1;
  string message_id = 2;
  int64 read_at = 3;
}

// Get read receipts for a message
message GetReadReceiptsRequest {
  string message_id = 1;
}

message GetReadReceiptsResponse {
  common.ErrorCode code = 1;
  repeated ReadReceipt receipts = 2;
}

// Get unread count
message GetUnreadCountRequest {
  string user_id = 1;
}

message GetUnreadCountResponse {
  common.ErrorCode code = 1;
  int32 total_unread = 2;
  message ChannelUnread {
    string channel_id = 1;
    ChannelType channel_type = 2;
    int32 count = 3;
    string last_message_id = 4;
  }
  repeated ChannelUnread channels = 3;
}

// Read notification (sent to sender)
message MessageReadNotify {
  string channel_id = 1;
  ChannelType channel_type = 2;
  string message_id = 3;
  string reader_user_id = 4;
  int64 read_at = 5;
}

// ========== Typing Indicators ==========

message TypingIndicator {
  string channel_id = 1;
  ChannelType channel_type = 2;
  string user_id = 3;
  bool is_typing = 4;
  int64 timestamp = 5;
}

// ========== Message Delivery (ACK/NACK) ==========

// Message acknowledgment
message MessageAck {
  string message_id = 1;
  string user_id = 2;
  int64 received_at = 3;
}

// Message negative acknowledgment (delivery failed)
message MessageNack {
  string message_id = 1;
  string user_id = 2;
  common.ErrorCode error_code = 3;
  string error_message = 4;
  int64 failed_at = 5;
}

// Delivery status
message DeliveryStatus {
  string message_id = 1;
  string user_id = 2;
  enum Status {
    PENDING = 0;
    DELIVERED = 1;
    FAILED = 2;
    ACKNOWLEDGED = 3;
  }
  Status status = 3;
  int64 timestamp = 4;
  int retry_count = 5;
}

// ========== Enhanced History with Pagination ==========

// Pagination token for cursor-based pagination
message PaginationToken {
  string cursor = 1;
  int64 timestamp = 2;
  int32 page_size = 3;
}

// Enhanced history request with pagination
message GetHistoryRequestV2 {
  string user_id = 1;
  ChannelType channel_type = 2;
  string channel_id = 3;
  PaginationToken pagination = 4;  // Cursor for next page
  int32 limit = 5;                 // Max messages per page (default: 50)
  bool include_deleted = 6;        // Include soft-deleted messages
  int64 since_timestamp = 7;       // Only messages after this time
}

// Enhanced history response
message GetHistoryResponseV2 {
  common.ErrorCode code = 1;
  repeated ChatMessage messages = 2;
  PaginationToken next_page = 3;   // Token for next page
  bool has_more = 4;
  int32 total_count = 5;           // Total messages matching query
}

// Message delivery tracking request
message TrackMessageRequest {
  string message_id = 1;
  string receiver_id = 2;
  int64 expires_at = 3;
}

// Message delivery tracking response
message TrackMessageResponse {
  common.ErrorCode code = 1;
  string tracking_id = 2;
  int64 server_time = 3;
}

// ========== Discord-like Channel System ==========

// Channel type (for hierarchical channels within groups/servers)
enum ChannelKind {
  TEXT = 0;           // Text channel
  VOICE = 1;          // Voice channel
  ANNOUNCEMENT = 2;   // Announcement channel (admin only post)
  STAGE = 3;          // Stage channel (for events)
  FORUM = 4;          // Forum channel (threaded discussions)
}

// Channel permission override
enum PermissionType {
  ROLE = 0;           // Role-based permission
  USER = 1;           // User-specific permission
}

enum PermissionOverride {
  INHERIT = 0;        // Use parent's permission
  ALLOW = 1;          // Explicitly allow
  DENY = 2;           // Explicitly deny (takes precedence)
}

// Channel permissions
message ChannelPermissions {
  bool can_read = 1;
  bool can_write = 2;
  bool can_speak = 3;       // For voice channels
  bool can_join = 4;        // For voice channels
  bool can_manage = 5;      // Can edit channel settings
}

// Permission override for a role/user
message PermissionOverrideEntry {
  PermissionType type = 1;     // ROLE or USER
  string id = 2;               // Role ID or User ID
  ChannelPermissions permissions = 3;
  PermissionOverride allow = 4;
  PermissionOverride deny = 5;
}

// Channel category (for organizing channels)
message ChannelCategory {
  string category_id = 1;
  string group_id = 2;
  string name = 3;
  int32 position = 4;          // Display order
  bool is_collapsed = 5;       // Default collapsed state
  int64 created_at = 6;
}

// Channel within a group/server
message Channel {
  string channel_id = 1;
  string group_id = 2;
  string category_id = 3;      // Optional category
  string name = 4;
  ChannelKind kind = 5;
  int32 position = 6;          // Display order within category
  string description = 7;
  bool is_nsfw = 8;
  int64 created_at = 9;
  int64 slowmode_seconds = 10; // Slow mode: users can only send one message per X seconds
  repeated PermissionOverrideEntry permission_overrides = 11;

  // Voice-specific fields
  int32 bitrate = 12;          // Voice channel bitrate
  int32 user_limit = 13;       // 0 for unlimited
  string rtc_region = 14;      // Voice region (auto if empty)
}

// Create channel request
message CreateChannelRequest {
  string group_id = 1;
  string requester_id = 2;
  string name = 3;
  ChannelKind kind = 4;
  string category_id = 5;      // Optional
  string description = 6;
  repeated PermissionOverrideEntry permission_overrides = 7;
  int32 position = 8;
}

message CreateChannelResponse {
  common.ErrorCode code = 1;
  Channel channel = 2;
  int64 server_time = 3;
}

// Update channel request
message UpdateChannelRequest {
  string channel_id = 1;
  string requester_id = 2;
  optional string name = 3;
  optional string description = 4;
  optional int32 position = 5;
  optional string category_id = 6;
  repeated PermissionOverrideEntry permission_overrides = 7;
}

message UpdateChannelResponse {
  common.ErrorCode code = 1;
  Channel channel = 2;
  int64 server_time = 3;
}

// Delete channel request
message DeleteChannelRequest {
  string channel_id = 1;
  string requester_id = 2;
}

message DeleteChannelResponse {
  common.ErrorCode code = 1;
  int64 server_time = 2;
}

// Get channels in a group
message GetChannelsRequest {
  string group_id = 1;
  string user_id = 2;          // For permission checking
}

message GetChannelsResponse {
  common.ErrorCode code = 1;
  repeated Channel channels = 2;
  repeated ChannelCategory categories = 3;
}

// Create category request
message CreateCategoryRequest {
  string group_id = 1;
  string requester_id = 2;
  string name = 3;
  int32 position = 4;
}

message CreateCategoryResponse {
  common.ErrorCode code = 1;
  ChannelCategory category = 2;
  int64 server_time = 3;
}

// Channel notification messages
message ChannelCreatedNotify {
  Channel channel = 1;
  int64 timestamp = 2;
}

message ChannelUpdatedNotify {
  Channel channel = 1;
  int64 timestamp = 2;
}

message ChannelDeletedNotify {
  string channel_id = 1;
  string group_id = 2;
  int64 timestamp = 3;
}

// ========== Message Reactions ==========

// Message reaction
message MessageReaction {
  string message_id = 1;
  string emoji = 2;            // Unicode emoji or custom emoji ID
  int32 count = 3;             // Number of reactions
  repeated string user_ids = 4; // Users who reacted (for small counts)
  bool reacted_by_me = 5;      // Whether the requesting user reacted
}

// Add reaction request
message AddReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string emoji = 3;            // Unicode emoji (e.g., "👍") or custom ID
}

message AddReactionResponse {
  common.ErrorCode code = 1;
  MessageReaction reaction = 2;
  int64 server_time = 3;
}

// Remove reaction request
message RemoveReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string emoji = 3;
}

message RemoveReactionResponse {
  common.ErrorCode code = 1;
  int64 server_time = 2;
}

// Get reactions for a message
message GetReactionsRequest {
  string message_id = 1;
  string emoji = 2;            // Optional: get reactions for specific emoji
}

message GetReactionsResponse {
  common.ErrorCode code = 1;
  repeated MessageReaction reactions = 2;
}

// Reaction notification
message ReactionAddedNotify {
  string message_id = 1;
  string channel_id = 2;
  string emoji = 3;
  string user_id = 4;
  int64 timestamp = 5;
}

message ReactionRemovedNotify {
  string message_id = 1;
  string channel_id = 2;
  string emoji = 3;
  string user_id = 4;
  int64 timestamp = 5;
}

// ========== Message Mentions ==========

// Mention type
enum MentionType {
  USER = 0;           // @username
  ROLE = 1;           // @role
  CHANNEL = 2;        // #channel
  EVERYONE = 3;       // @everyone
  HERE = 4;           // @here
}

// Mention in a message
message Mention {
  MentionType type = 1;
  string id = 2;              // User ID, Role ID, or Channel ID
  int32 start_index = 3;      // Position in message content
  int32 length = 4;
}

// Extended chat message with mentions
message ChatMessageEx {
  ChatMessage base_message = 1;
  repeated Mention mentions = 2;
  repeated string mentioned_user_ids = 3;  // Users who should be notified
  bool mentions_everyone = 4;
  bool mentions_here = 5;
}
