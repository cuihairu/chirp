syntax = "proto3";

package chirp.gateway;

option go_package = "github.com/cui/chirp/proto/gateway";

// Message ID definition for dispatching
enum MsgID {
  UNKNOWN = 0;
  HEARTBEAT_PING = 1001;
  HEARTBEAT_PONG = 1002;
  LOGIN_REQ = 1003;
  LOGIN_RESP = 1004;
  KICK_NOTIFY = 1005;
  LOGOUT_REQ = 1006;
  LOGOUT_RESP = 1007;

  // Chat service
  SEND_MESSAGE_REQ = 2001;
  SEND_MESSAGE_RESP = 2002;
  GET_HISTORY_REQ = 2003;
  GET_HISTORY_RESP = 2004;
  CHAT_MESSAGE_NOTIFY = 2005;

  // Group chat
  CREATE_GROUP_REQ = 2101;
  CREATE_GROUP_RESP = 2102;
  JOIN_GROUP_REQ = 2103;
  JOIN_GROUP_RESP = 2104;
  LEAVE_GROUP_REQ = 2105;
  LEAVE_GROUP_RESP = 2106;
  KICK_MEMBER_REQ = 2107;
  KICK_MEMBER_RESP = 2108;
  GET_GROUP_INFO_REQ = 2109;
  GET_GROUP_INFO_RESP = 2110;
  GET_GROUP_MEMBERS_REQ = 2111;
  GET_GROUP_MEMBERS_RESP = 2112;
  GET_USER_GROUPS_REQ = 2113;
  GET_USER_GROUPS_RESP = 2114;
  INVITE_TO_GROUP_REQ = 2115;
  INVITE_TO_GROUP_RESP = 2116;
  GROUP_CREATED_NOTIFY = 2117;
  GROUP_MEMBER_JOINED_NOTIFY = 2118;
  GROUP_MEMBER_LEFT_NOTIFY = 2119;
  GROUP_MEMBER_KICKED_NOTIFY = 2120;
  GROUP_UPDATED_NOTIFY = 2121;

  // Read receipts
  MARK_READ_REQ = 2201;
  MARK_READ_RESP = 2202;
  GET_READ_RECEIPTS_REQ = 2203;
  GET_READ_RECEIPTS_RESP = 2204;
  GET_UNREAD_COUNT_REQ = 2205;
  GET_UNREAD_COUNT_RESP = 2206;
  MESSAGE_READ_NOTIFY = 2207;

  // Typing indicators
  TYPING_INDICATOR_NOTIFY = 2208;

  // Social service
  ADD_FRIEND_REQ = 3001;
  ADD_FRIEND_RESP = 3002;
  FRIEND_REQUEST_ACTION_REQ = 3003;
  FRIEND_REQUEST_ACTION_RESP = 3004;
  REMOVE_FRIEND_REQ = 3005;
  REMOVE_FRIEND_RESP = 3006;
  GET_FRIEND_LIST_REQ = 3007;
  GET_FRIEND_LIST_RESP = 3008;
  GET_PENDING_REQUESTS_REQ = 3009;
  GET_PENDING_REQUESTS_RESP = 3010;
  BLOCK_USER_REQ = 3011;
  BLOCK_USER_RESP = 3012;
  UNBLOCK_USER_REQ = 3013;
  UNBLOCK_USER_RESP = 3014;
  GET_BLOCKED_LIST_REQ = 3015;
  GET_BLOCKED_LIST_RESP = 3016;
  SET_PRESENCE_REQ = 3017;
  SET_PRESENCE_RESP = 3018;
  GET_PRESENCE_REQ = 3019;
  GET_PRESENCE_RESP = 3020;
  PRESENCE_NOTIFY = 3021;
  FRIEND_REQUEST_NOTIFY = 3022;
  FRIEND_ACCEPTED_NOTIFY = 3023;
  FRIEND_REMOVED_NOTIFY = 3024;

  // Voice service
  CREATE_ROOM_REQ = 4001;
  CREATE_ROOM_RESP = 4002;
  JOIN_ROOM_REQ = 4003;
  JOIN_ROOM_RESP = 4004;
  LEAVE_ROOM_REQ = 4005;
  LEAVE_ROOM_RESP = 4006;
  ICE_CANDIDATE_MSG = 4007;
  SDP_OFFER_MSG = 4008;
  SDP_ANSWER_MSG = 4009;
  GET_ROOM_INFO_REQ = 4010;
  GET_ROOM_INFO_RESP = 4011;
  GET_USER_ROOM_REQ = 4012;
  GET_USER_ROOM_RESP = 4013;
  SET_MUTE_REQ = 4014;
  SET_MUTE_RESP = 4015;
  SET_DEAFEN_REQ = 4016;
  SET_DEAFEN_RESP = 4017;
  PARTICIPANT_JOINED_NOTIFY = 4018;
  PARTICIPANT_LEFT_NOTIFY = 4019;
  PARTICIPANT_STATE_CHANGED_NOTIFY = 4020;
  SPEAKING_NOTIFY = 4021;
}

// Universal Packet Envelope (Optional, if we want full protobuf wrap)
// Usually we use Length-Prefixed + Raw Bytes for Body, 
// but for simplicity in some SDKs, a full envelope is used.
message Packet {
  MsgID msg_id = 1;
  int64 sequence = 2;
  bytes body = 3;
}

message HeartbeatPing {
  int64 timestamp = 1;
}

message HeartbeatPong {
  int64 timestamp = 1;
  int64 server_time = 2;
}
