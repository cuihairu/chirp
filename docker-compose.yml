services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: chirp_password
      MYSQL_DATABASE: chirp
      MYSQL_USER: chirp
      MYSQL_PASSWORD: chirp_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: auth
    command: ["--port", "6000", "--jwt_secret", "dev_secret"]
    ports:
      - "6000:6000"

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: gateway
    command:
      [
        "--port", "5000",
        "--ws_port", "5001",
        "--auth_host", "auth",
        "--auth_port", "6000",
        "--redis_host", "redis",
        "--redis_port", "6379",
        "--redis_ttl", "3600",
        "--instance_id", "gw_1"
      ]
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - auth
      - redis

  chat:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: chat_enhanced
    command: ["--port", "7000", "--ws_port", "7001", "--redis_host", "redis", "--redis_port", "6379", "--mysql_host", "mysql", "--mysql_port", "3306", "--mysql_database", "chirp", "--mysql_user", "chirp", "--mysql_password", "chirp_pass"]
    ports:
      - "7000:7000"
      - "7001:7001"
    depends_on:
      - redis
      - mysql

  social:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: social
    command: ["--port", "8000", "--ws_port", "8001", "--redis_host", "redis", "--redis_port", "6379"]
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - redis

  voice:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: voice
    command: ["--port", "9000", "--ws_port", "9001"]
    ports:
      - "9000:9000"
      - "9001:9001"

  notification:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: notification
    command: ["--port", "5006"]
    ports:
      - "5006:5006"

  search:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: search
    command: ["--port", "5007"]
    ports:
      - "5007:5007"

volumes:
  mysql_data:
